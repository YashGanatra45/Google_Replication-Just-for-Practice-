<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Google</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: arial, sans-serif;
      font-size: 14px;
      color: #202124;
      background: #fff;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Top Nav ── */
    header {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 14px 20px 0;
      gap: 14px;
    }

    header a {
      color: #202124;
      text-decoration: none;
      font-size: 13px;
    }

    header a:hover {
      text-decoration: underline;
    }

    .sign-in-btn {
      background-color: #1a73e8;
      color: #fff !important;
      border-radius: 4px;
      padding: 8px 18px;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none !important;
      transition: box-shadow 0.15s, background 0.15s;
    }

    .sign-in-btn:hover {
      background-color: #1765cc;
      box-shadow: 0 1px 3px rgba(0,0,0,.3);
      text-decoration: none !important;
    }

    /* ── Main Content ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding-bottom: 80px;
    }

    /* ── Logo ── */
    .logo {
      margin-bottom: 28px;
    }

    .logo svg {
      width: 272px;
      height: 92px;
    }

    /* ── Search Box ── */
    .search-box-wrapper {
      width: 100%;
      max-width: 584px;
      margin-bottom: 26px;
    }

    .search-box {
      display: flex;
      align-items: center;
      border: 1px solid #dfe1e5;
      border-radius: 24px;
      padding: 0 14px;
      height: 44px;
      gap: 10px;
      transition: box-shadow 0.15s;
    }

    .search-box:hover,
    .search-box:focus-within {
      box-shadow: 0 1px 6px rgba(32,33,36,.28);
      border-color: rgba(223,225,229,0);
    }

    .search-icon {
      color: #9aa0a6;
      flex-shrink: 0;
    }

    .search-input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 16px;
      color: #202124;
      background: transparent;
    }

    .search-input::placeholder {
      color: transparent;
    }

    .voice-icon,
    .camera-icon {
      color: #4285f4;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }

    .voice-icon svg,
    .camera-icon svg {
      width: 24px;
      height: 24px;
    }

    .divider-icon {
      width: 1px;
      height: 24px;
      background: #dfe1e5;
    }

    /* ── Buttons ── */
    .search-buttons {
      display: flex;
      justify-content: center;
      gap: 12px;
    }

    .search-btn {
      background-color: #f8f9fa;
      border: 1px solid #f8f9fa;
      border-radius: 4px;
      color: #3c4043;
      font-size: 14px;
      padding: 0 16px;
      height: 36px;
      cursor: pointer;
      white-space: nowrap;
      transition: box-shadow 0.1s, border-color 0.1s;
    }

    .search-btn:hover {
      box-shadow: 0 1px 1px rgba(0,0,0,.1);
      border-color: #dadce0;
      color: #202124;
    }

    /* ── Language line ── */
    .language-line {
      margin-top: 28px;
      font-size: 13px;
      color: #202124;
    }

    .language-line a {
      color: #1a0dab;
      text-decoration: none;
      margin-left: 4px;
    }

    .language-line a:hover {
      text-decoration: underline;
    }

    /* ── Footer ── */
    footer {
      background: #f2f2f2;
      border-top: 1px solid #e4e4e4;
      font-size: 14px;
      color: #70757a;
    }

    .footer-top {
      padding: 14px 24px;
      border-bottom: 1px solid #e4e4e4;
    }

    .footer-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 24px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .footer-links {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .footer-links a,
    .footer-top a {
      color: #70757a;
      text-decoration: none;
    }

    .footer-links a:hover,
    .footer-top a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <a href="#">About</a>
    <a href="#">Store</a>
    <a href="#">Gmail</a>
    <a href="#">Images</a>
    <!-- Apps grid icon -->
    <svg focusable="false" viewBox="0 0 24 24" width="24" height="24" style="cursor:pointer; color:#5f6368; fill:#5f6368">
      <path d="M6,8c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM12,20c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM6,20c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM6,14c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM12,14c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM16,6c0,1.1 0.9,2 2,2s2,-0.9 2,-2 -0.9,-2 -2,-2 -2,0.9 -2,2zM12,8c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM18,14c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM18,20c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2z"></path>
    </svg>
    <a href="#" class="sign-in-btn">Sign in</a>
  </header>

  <!-- Main -->
  <main>

    <!-- Google Logo (SVG text) -->
    <div class="logo">
      <svg viewBox="0 0 272 92" xmlns="http://www.w3.org/2000/svg" aria-label="Google">
        <!-- G -->
        <path fill="#4285F4" d="M115.75 47.18c0 12.77-9.99 22.18-22.25 22.18s-22.25-9.41-22.25-22.18C71.25 34.32 81.24 25 93.5 25s22.25 9.32 22.25 22.18zm-9.74 0c0-7.98-5.79-13.44-12.51-13.44S80.99 39.2 80.99 47.18c0 7.9 5.79 13.44 12.51 13.44s12.51-5.55 12.51-13.44z"/>
        <!-- O -->
        <path fill="#EA4335" d="M163.75 47.18c0 12.77-9.99 22.18-22.25 22.18s-22.25-9.41-22.25-22.18c0-12.85 9.99-22.18 22.25-22.18s22.25 9.32 22.25 22.18zm-9.74 0c0-7.98-5.79-13.44-12.51-13.44s-12.51 5.46-12.51 13.44c0 7.9 5.79 13.44 12.51 13.44s12.51-5.55 12.51-13.44z"/>
        <!-- o -->
        <path fill="#FBBC05" d="M209.75 26.34v39.82c0 16.38-9.66 23.07-21.08 23.07-10.75 0-17.22-7.19-19.67-13.07l8.48-3.53c1.51 3.61 5.21 7.87 11.17 7.87 7.31 0 11.84-4.51 11.84-13v-3.19h-.34c-2.18 2.69-6.38 5.04-11.68 5.04-11.09 0-21.25-9.66-21.25-22.09 0-12.52 10.16-22.26 21.25-22.26 5.29 0 9.49 2.35 11.68 4.96h.34v-3.61h9.26zm-8.56 20.92c0-7.81-5.21-13.52-11.84-13.52-6.72 0-12.35 5.71-12.35 13.52 0 7.73 5.63 13.36 12.35 13.36 6.63 0 11.84-5.63 11.84-13.36z"/>
        <!-- g -->
        <path fill="#4285F4" d="M225 3v65h-9.5V3h9.5z"/>
        <!-- l -->
        <path fill="#34A853" d="M262.02 54.48l7.56 5.04c-2.44 3.61-8.32 9.83-18.48 9.83-12.6 0-22.01-9.74-22.01-22.18 0-13.19 9.49-22.18 20.92-22.18 11.51 0 17.14 9.16 18.98 14.11l1.01 2.52-29.65 12.28c2.27 4.45 5.8 6.72 10.75 6.72 4.96 0 8.4-2.44 10.92-6.14zm-23.27-7.98l19.82-8.23c-1.09-2.77-4.37-4.7-8.23-4.7-4.95 0-11.84 4.37-11.59 12.93z"/>
        <!-- e -->
        <!-- Simplified: just draw the word "Google" as colored text for clarity -->
      </svg>
      <!-- Fallback simple text-based logo -->
      <div style="display:flex; align-items:baseline; font-size:68px; font-family:'Product Sans',arial,sans-serif; line-height:1; letter-spacing:-2px; user-select:none;">
        <span style="color:#4285F4;">G</span><span style="color:#EA4335;">o</span><span style="color:#FBBC05;">o</span><span style="color:#4285F4;">g</span><span style="color:#34A853;">l</span><span style="color:#EA4335;">e</span>
      </div>
    </div>
    <!-- hide the svg, use the text logo -->
    <script>document.querySelector('.logo svg').style.display='none';</script>

    <!-- Search Box -->
    <div class="search-box-wrapper">
      <div class="search-box">
        <!-- Search icon -->
        <span class="search-icon">
          <svg focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20">
            <path fill="#9aa0a6" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
          </svg>
        </span>

        <input class="search-input" type="text" autocomplete="off" aria-label="Search" />

        <!-- Voice icon -->
        <span class="voice-icon" title="Search by voice">
          <svg focusable="false" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path fill="#4285f4" d="M12 15c1.66 0 3-1.34 3-3V6c0-1.66-1.34-3-3-3S9 4.34 9 6v6c0 1.66 1.34 3 3 3z"/>
            <path fill="#34a853" d="M17 12c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-2.08c3.39-.49 6-3.39 6-6.92h-2z"/>
          </svg>
        </span>

        <div class="divider-icon"></div>

        <!-- Camera icon -->
        <span class="camera-icon" title="Search by image">
          <svg focusable="false" viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
            <path fill="none" d="M0 0h192v192H0z"/>
            <path fill="#EA4335" d="M96 104c-8.84 0-16-7.16-16-16s7.16-16 16-16 16 7.16 16 16-7.16 16-16 16z"/>
            <path fill="#4285F4" d="M152 68h-28l-12-16H80L68 68H40c-8.84 0-16 7.16-16 16v72c0 8.84 7.16 16 16 16h112c8.84 0 16-7.16 16-16V84c0-8.84-7.16-16-16-16zm-56 92c-19.88 0-36-16.12-36-36s16.12-36 36-36 36 16.12 36 36-16.12 36-36 36z"/>
          </svg>
        </span>
      </div>
    </div>

    <!-- Buttons -->
    <div class="search-buttons">
      <button class="search-btn">Google Search</button>
      <button class="search-btn">I'm Feeling Lucky</button>
    </div>

    <!-- Language -->
    <div class="language-line">
      Google offered in: <a href="#">हिन्दी</a> <a href="#">বাংলা</a> <a href="#">తెలుగు</a> <a href="#">मराठी</a> <a href="#">தமிழ்</a> <a href="#">ગુજરાતી</a> <a href="#">ಕನ್ನಡ</a> <a href="#">മലയാളം</a> <a href="#">ਪੰਜਾਬੀ</a>
    </div>

  </main>

  <!-- Footer -->
  <footer>
    <div class="footer-top">India</div>
    <div class="footer-bottom">
      <div class="footer-links">
        <a href="#">About</a>
        <a href="#">Advertising</a>
        <a href="#">Business</a>
        <a href="#">How Search works</a>
      </div>
      <div class="footer-links">
        <a href="#">Privacy</a>
        <a href="#">Terms</a>
        <a href="#">Settings</a>
      </div>
    </div>
  </footer>

</body>
</html>
